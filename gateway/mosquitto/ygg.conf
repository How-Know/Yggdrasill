# Yggdrasill local MQTT broker (LAN-only)
# M5 기기 및 게이트웨이가 학원 내부 WiFi에서 접속하는 전용 브로커.
# 공용 broker.emqx.io 대체 — 메시지 유실/끊김 방지.

# 모든 인터페이스에서 1883 수신 (M5가 PC의 LAN IP로 접속)
listener 1883 0.0.0.0

# 학원 내부망 전용이므로 익명 허용 (필요 시 추후 pwfile로 인증 추가)
allow_anonymous true

# PM2 로그로 출력
log_dest stdout
# 실시간 진단용 파일 로그(버퍼링 없이 즉시 기록)
log_dest file C:/Users/harry/Yggdrasill/gateway/mosquitto/mosquitto-live.log
log_type warning
log_type notice
log_type information

# 디스크 영속성 비활성 (실시간 브리지 용도, 재시작 시 깨끗하게)
persistence false

# 기기 keepalive 자유롭게 허용
max_keepalive 0
