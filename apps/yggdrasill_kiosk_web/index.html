<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Yggdrasill 출석</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- 메인 (잠금화면 스타일) -->
    <main id="main" class="hidden">
      <header id="header">
        <div id="subline">
          <span id="dateText"></span>
          <span id="sep1" class="sep">·</span>
          <span id="academyText"></span>
          <span id="sep2" class="sep hidden">·</span>
          <span id="weatherText" class="hidden"></span>
        </div>
        <div id="clock">00:00</div>
      </header>

      <section id="stage">
        <img id="poster" src="assets/poster.png" alt="공지 포스터" />
        <div id="announcement" class="hidden">
          <h1 id="annTitle"></h1>
          <p id="annBody"></p>
        </div>
      </section>

      <button id="fab" type="button">
        <svg class="fab-icon" viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="4,13 9.5,18.5 20,6"
                    fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="square" stroke-linejoin="miter" />
        </svg>
        <span>출석</span>
      </button>
    </main>

    <!-- 오른쪽 슬라이드 시트 -->
    <aside id="sheet" aria-hidden="true">
      <div class="sheet-top">
        <button id="searchBtn" type="button" class="search-btn">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2.2" />
            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
          </svg>
          <span>학생 이름 검색</span>
        </button>
        <button id="closeBtn" type="button" class="close-btn" aria-label="닫기">&#10005;</button>
      </div>
      <div class="sheet-label">오늘 예정</div>
      <div id="studentList" class="student-list"></div>
      <div id="pinPanel" class="pin-panel hidden">
        <div id="pinTitle" class="pin-title"></div>
        <div id="pinGuide" class="pin-guide"></div>
        <label id="noticePrintRow" class="notice-print-row hidden">
          <input type="checkbox" id="noticePrintCheck" checked />
          <span class="notice-print-box" aria-hidden="true">
            <svg viewBox="0 0 24 24"><polyline points="4,13 9.5,18.5 20,6"
              fill="none" stroke="currentColor" stroke-width="3"
              stroke-linecap="square" stroke-linejoin="miter" /></svg>
          </span>
          <span class="notice-print-label">알림장 인쇄</span>
        </label>
        <div id="pinDots" class="pin-dots"></div>
        <div id="pinFeedback" class="pin-feedback"></div>
        <div id="keypad" class="keypad"></div>
      </div>
    </aside>

    <!-- 검색 다이얼로그 -->
    <div id="searchOverlay" class="overlay hidden">
      <div class="search-dialog">
        <div class="search-dialog-top">
          <div class="search-field">
            <svg class="search-field-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2.2" />
              <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
            </svg>
            <input id="searchInput" type="text" inputmode="text"
                   placeholder="학생 이름 또는 초성 검색" autocomplete="off" />
          </div>
          <button id="searchClose" type="button" class="close-btn dark" aria-label="닫기">&#10005;</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>

    <!-- 알림장 인쇄 진행 다이얼로그 -->
    <div id="printOverlay" class="overlay hidden">
      <div class="print-dialog">
        <div id="printSpinner" class="spinner spinner-green"></div>
        <div id="printPercent" class="print-percent">0%</div>
        <div id="printTitle" class="print-title">알림장 인쇄 중…</div>
        <div id="printMsg" class="print-msg">잠시만 기다려 주세요</div>
        <button id="printClose" type="button" class="setup-btn hidden">닫기</button>
      </div>
    </div>

    <!-- 설정 / 페어링 오버레이 -->
    <div id="setup" class="overlay">
      <div class="setup-panel">
        <div class="setup-logo">&#127794;</div>
        <div id="setupBody"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
